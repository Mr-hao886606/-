# ============================================
# H2 内存数据库配置（免安装MySQL快速启动）
# 切换方式：application.yml 中 spring.profiles.active: h2
# ============================================

spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:canteen;DB_CLOSE_DELAY=-1;MODE=MySQL
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
      encoding: UTF-8
      schema-locations: classpath:db/schema-h2.sql
      data-locations: classpath:db/data-h2.sql
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT配置
jwt:
  secret: canteen-jwt-secret-key-2024-campus-food-system
  expiration: 86400000

# 文件上传
file:
  upload:
    path: ./uploads/
